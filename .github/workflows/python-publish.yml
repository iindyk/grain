name: test with TF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: "${{ matrix.os }}"

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        os: [macos-latest]

    steps:
      - name: test with TF
        run: |
          set -xe
          python3 -m pip install tensorflow==2.17.0 grain
          python3 -c -m trace --trace "import tensorflow as tf ; from grain import python as grain"
